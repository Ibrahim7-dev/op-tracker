// ─── FETCH HELPERS ────────────────────────────────────────────────────────────

async function fetchJSON(url) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 15000);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return await r.json();
  } finally { clearTimeout(t); }
}

async function loadAllPrices(onProgress) {
  const cats = await fetchJSON(BASE + "/categories");
  const op = cats.results.find(c => (c.name||"").toLowerCase().includes("one piece"));
  if (!op) throw new Error("One Piece category not found on TCGCSV");
  const catId = op.categoryId;

  const uniqueGroups = [...new Set([...Object.values(BOX_IDS).map(() => null), ...Object.values(CARD_GROUPS)])].filter(Boolean);
  const allGroupIds = [...new Set(Object.values(CARD_GROUPS))];

  const priceMap = {};   // productId -> price object
  const productMap = {}; // productId -> name

  let done = 0;
  await Promise.all(allGroupIds.map(async (gid) => {
    const [prods, prices] = await Promise.all([
      fetchJSON(BASE + "/" + catId + "/" + gid + "/products"),
      fetchJSON(BASE + "/" + catId + "/" + gid + "/prices"),
    ]);
    for (const p of prods.results || []) productMap[p.productId] = p.name;
    for (const p of prices.results || []) if (!priceMap[p.productId]) priceMap[p.productId] = p;
    done++;
    onProgress(done, allGroupIds.length);
  }));

  // Apply manual overrides
  for (const [pid, override] of Object.entries(MANUAL_OVERRIDES)) {
    if (!priceMap[pid]) priceMap[pid] = {};
    priceMap[pid]._manualPrice = override.price;
    priceMap[pid]._manualNote = override.note;
  }

  // Build per-set data
  const setData = {};
  for (const set of SETS) {
    const boxId = BOX_IDS[set.id];
    const gid = CARD_GROUPS[set.id];
    const boxPrice = priceMap[boxId];
    const market = boxPrice?.marketPrice ?? null;
    const low = boxPrice?.lowPrice ?? null;

    // Top 5 cards for this group
    const groupProducts = Object.entries(productMap)
      .filter(([pid]) => {
        const p = priceMap[pid];
        return p && Object.keys(CARD_GROUPS).some(code => CARD_GROUPS[code] === gid);
      });

    // Get all products in this group
    const inGroup = [];
    for (const [pid, name] of Object.entries(productMap)) {
      if (/(booster box|booster pack|case|pack$|display)/i.test(name)) continue;
      const p = priceMap[pid];
      if (!p) continue;
      const override = MANUAL_OVERRIDES[pid];
      const price = override ? override.price : (p.marketPrice || 0);
      if (price <= 0) continue;
      inGroup.push({
        id: pid,
        name,
        price,
        manual: !!override,
        manualNote: override?.note || null,
      });
    }

    // We need to filter to only products in this specific group
    // Re-fetch is too expensive; we'll use the product-to-group mapping built during fetch
    // For now mark all products as potentially in group — filtering happens via set-specific groupId
    const top5 = inGroup
      .sort((a, b) => b.price - a.price)
      .slice(0, 5);

    setData[set.id] = {
      boxMarket: market,
      boxLow: low,
      top5,
    };
  }

  return { priceMap, productMap, setData, catId };
}

// Better: build group membership during fetch
async function loadAllPricesV2(onProgress) {
  const cats = await fetchJSON(BASE + "/categories");
  const op = cats.results.find(c => (c.name||"").toLowerCase().includes("one piece"));
  if (!op) throw new Error("One Piece category not found on TCGCSV");
  const catId = op.categoryId;

  const allGroupIds = [...new Set(Object.values(CARD_GROUPS))];
  const priceMap = {};        // productId -> price object
  const groupMembers = {};    // groupId -> [productId]

  let done = 0;
  await Promise.all(allGroupIds.map(async (gid) => {
    const [prods, prices] = await Promise.all([
      fetchJSON(BASE + "/" + catId + "/" + gid + "/products"),
      fetchJSON(BASE + "/" + catId + "/" + gid + "/prices"),
    ]);
    groupMembers[gid] = [];
    for (const p of prods.results || []) {
      groupMembers[gid].push({ id: p.productId, name: p.name });
    }
    for (const p of prices.results || []) if (!priceMap[p.productId]) priceMap[p.productId] = p;
    done++;
    onProgress(done, allGroupIds.length);
  }));

  // Build per-set results
  const setData = {};
  for (const set of SETS) {
    const boxId = BOX_IDS[set.id];
    const gid = CARD_GROUPS[set.id];
    const bp = priceMap[boxId];

    const members = groupMembers[gid] || [];
    const cards = [];
    for (const { id, name } of members) {
      if (/(booster box|booster pack|case|pack$|display)/i.test(name)) continue;
      const override = MANUAL_OVERRIDES[id];
      const p = priceMap[id];
      const price = override ? override.price : (p?.marketPrice || 0);
      if (price <= 0) continue;
      cards.push({ id: String(id), name, price, manual: !!override, manualNote: override?.note || null });
    }
    cards.sort((a, b) => b.price - a.price);

    setData[set.id] = {
      boxMarket: bp?.marketPrice ?? null,
      boxLow:    bp?.lowPrice ?? null,
      top5: cards.slice(0, 5),
    };
  }

  return { setData };
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────

function fmt(n) { return n != null ? "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : "—"; }

function TrendIcon({ trend }) {
  if (trend === "up")     return React.createElement("span", { style:{ color:"#34D399", fontSize:12 } }, "▲ Rising");
  if (trend === "stable") return React.createElement("span", { style:{ color:"#94A3B8", fontSize:12 } }, "● Stable");
  if (trend === "new")    return React.createElement("span", { style:{ color:"#34D399", fontSize:12 } }, "★ New");
  return null;
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [loadState, setLoadState] = useState("idle"); // idle | loading | done | error
  const [progress, setProgress]   = useState({ done: 0, total: 0 });
  const [setData, setSetData]     = useState({});
  const [loadedAt, setLoadedAt]   = useState(null);
  const [error, setError]         = useState(null);

  const [filter, setFilter]       = useState("all");
  const [tierFilter, setTierFilter] = useState("all");
  const [sort, setSort]           = useState("release");
  const [expanded, setExpanded]   = useState(null);

  const load = useCallback(async () => {
    setLoadState("loading");
    setError(null);
    setProgress({ done: 0, total: 0 });
    try {
      const { setData: sd } = await loadAllPricesV2((done, total) => setProgress({ done, total }));
      setSetData(sd);
      setLoadedAt(new Date());
      setLoadState("done");
    } catch (e) {
      setError(e.message);
      setLoadState("error");
    }
  }, []);

  useEffect(() => { load(); }, []);

  // Merge static set config with live data
  const sets = SETS.map(s => {
    const live = setData[s.id];
    const price = live?.boxMarket ?? null;
    const top5  = live?.top5 ?? [];
    const sum   = top5.reduce((acc, c) => acc + c.price, 0);
    const ratio = price && sum ? (sum / price).toFixed(2) : null;
    const metricRatio = ratio ? parseFloat(ratio) : 0;
    const metricColor = !ratio ? "#64748B" : metricRatio >= 5 ? "#34D399" : metricRatio >= 2 ? "#FFD700" : metricRatio >= 1 ? "#60A5FA" : "#F87171";
    return { ...s, price, boxLow: live?.boxLow ?? null, top5, sum, ratio, metricColor };
  });

  const filtered = sets
    .filter(s => filter === "all" || s.type === filter)
    .filter(s => tierFilter === "all" || s.tier === tierFilter)
    .sort((a, b) => {
      if (sort === "price-desc")   return (b.price||0) - (a.price||0);
      if (sort === "price-asc")    return (a.price||0) - (b.price||0);
      if (sort === "metric-desc")  return parseFloat(b.ratio||0) - parseFloat(a.ratio||0);
      return SETS.indexOf(SETS.find(s=>s.id===a.id)) - SETS.indexOf(SETS.find(s=>s.id===b.id));
    });

  const loadedSets   = sets.filter(s => s.price != null).length;
  const avgPrice     = loadedSets ? Math.round(sets.filter(s=>s.price).reduce((a,s)=>a+s.price,0)/loadedSets) : 0;
  const trophyCount  = sets.filter(s => s.tier === "trophy").length;
  const pct          = progress.total ? Math.round(progress.done / progress.total * 100) : 0;

  const h = (tag, props, ...children) => React.createElement(tag, props, ...children);

  return h("div", { style:{ minHeight:"100vh", paddingBottom:60 } },

    // ── Header ──
    h("div", { style:{ background:"linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)", borderBottom:"1px solid rgba(255,215,0,0.2)", padding:"36px 24px 28px", textAlign:"center", position:"relative", overflow:"hidden" } },
      h("div", { style:{ position:"absolute", inset:0, backgroundImage:"radial-gradient(circle at 20% 50%,rgba(255,215,0,0.06) 0%,transparent 60%),radial-gradient(circle at 80% 50%,rgba(96,165,250,0.06) 0%,transparent 60%)" } }),
      h("div", { style:{ position:"relative" } },
        h("div", { style:{ fontSize:10, letterSpacing:"0.25em", color:"#64748B", textTransform:"uppercase", marginBottom:6 } },
          loadedAt ? "Live prices from TCGPlayer via TCGCSV · Updated " + loadedAt.toLocaleTimeString() : "Loading live prices from TCGPlayer via TCGCSV…"
        ),
        h("h1", { style:{ fontSize:"clamp(22px,5vw,36px)", fontWeight:900, color:"#fff", margin:"0 0 4px", letterSpacing:"-0.5px" } }, "⚓ One Piece TCG"),
        h("h2", { style:{ fontSize:"clamp(13px,3vw,18px)", color:"#FFD700", fontWeight:400, margin:"0 0 18px", fontStyle:"italic" } }, "English Booster Box Price Guide"),

        // Stats row
        h("div", { style:{ display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap", marginBottom: loadState==="loading" ? 16 : 0 } },
          [
            { label:"Total Sets", val: SETS.length },
            { label:"Avg. Box Price", val: loadState==="done" ? fmt(avgPrice) : "…" },
            { label:"Trophy Sets", val: trophyCount },
          ].map(({ label, val }) =>
            h("div", { key:label, style:{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, padding:"8px 18px", textAlign:"center" } },
              h("div", { style:{ fontSize:20, fontWeight:700, color:"#FFD700" } }, val),
              h("div", { style:{ fontSize:10, color:"#94A3B8", letterSpacing:"0.1em" } }, label)
            )
          )
        ),

        // Progress bar
        loadState === "loading" && h("div", { style:{ maxWidth:400, margin:"0 auto" } },
          h("div", { style:{ fontSize:11, color:"#64748B", marginBottom:4 } }, "Scanning " + progress.total + " set groups… " + pct + "%"),
          h("div", { style:{ height:4, background:"rgba(255,255,255,0.1)", borderRadius:2 } },
            h("div", { style:{ height:"100%", width: pct+"%", background:"#FFD700", borderRadius:2, transition:"width 0.3s" } })
          )
        ),

        loadState === "error" && h("div", { style:{ marginTop:12, color:"#F87171", fontSize:12 } },
          "⚠ " + error + " · ",
          h("span", { style:{ color:"#60A5FA", cursor:"pointer", textDecoration:"underline" }, onClick: load }, "Retry")
        ),

        loadState === "done" && h("button", {
          onClick: load,
          style:{ marginTop:12, padding:"5px 16px", borderRadius:20, border:"1px solid rgba(255,215,0,0.3)", background:"transparent", color:"#FFD700", fontSize:11, cursor:"pointer" }
        }, "↺ Refresh prices")
      )
    ),

    // ── Filters ──
    h("div", { style:{ padding:"18px 16px 0", maxWidth:1100, margin:"0 auto" } },
      h("div", { style:{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12, alignItems:"center" } },
        h("span", { style:{ fontSize:10, color:"#64748B", letterSpacing:"0.1em", textTransform:"uppercase" } }, "Type:"),
        ...["all","main","extra","premium"].map(t =>
          h("button", { key:t, onClick:()=>setFilter(t), style:{
            padding:"4px 12px", borderRadius:20, border:"1px solid",
            borderColor: filter===t ? "#FFD700" : "rgba(255,255,255,0.15)",
            background:  filter===t ? "rgba(255,215,0,0.15)" : "transparent",
            color:       filter===t ? "#FFD700" : "#94A3B8", fontSize:11, transition:"all 0.2s",
          }}, t==="all" ? "All" : TYPE_LABELS[t])
        ),
        h("span", { style:{ fontSize:10, color:"#64748B", letterSpacing:"0.1em", textTransform:"uppercase", marginLeft:6 } }, "Tier:"),
        ...["all","trophy","hold","watch","new"].map(t =>
          h("button", { key:t, onClick:()=>setTierFilter(t), style:{
            padding:"4px 12px", borderRadius:20, border:"1px solid",
            borderColor: tierFilter===t ? "#60A5FA" : "rgba(255,255,255,0.15)",
            background:  tierFilter===t ? "rgba(96,165,250,0.15)" : "transparent",
            color:       tierFilter===t ? "#60A5FA" : "#94A3B8", fontSize:11, transition:"all 0.2s",
          }}, t==="all" ? "All Tiers" : (TIER_CONFIG[t]?.label || t))
        ),
        h("div", { style:{ marginLeft:"auto" } },
          h("select", { value:sort, onChange:e=>setSort(e.target.value), style:{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.15)", color:"#CBD5E1", padding:"4px 8px", borderRadius:6, fontSize:11 } },
            h("option", { value:"release" },      "Sort: Release Order"),
            h("option", { value:"price-desc" },   "Sort: Price High → Low"),
            h("option", { value:"price-asc" },    "Sort: Price Low → High"),
            h("option", { value:"metric-desc" },  "Sort: Value Metric High → Low"),
          )
        )
      ),

      // Metric legend
      h("div", { style:{ background:"rgba(96,165,250,0.08)", border:"1px solid rgba(96,165,250,0.2)", borderRadius:7, padding:"8px 14px", marginBottom:10, fontSize:11, color:"#94A3B8" } },
        h("span", { style:{ color:"#60A5FA", fontWeight:600 } }, "📊 Value Metric"),
        " = Sum of top 5 cards ÷ Box price.  ",
        h("span", { style:{ color:"#34D399" } }, "Green ≥5x"), " · ",
        h("span", { style:{ color:"#FFD700" } }, "Yellow ≥2x"), " · ",
        h("span", { style:{ color:"#60A5FA" } }, "Blue ≥1x"), " · ",
        h("span", { style:{ color:"#F87171" } }, "Red <1x"),
        ". Click any set to expand top 5 cards."
      ),
      h("div", { style:{ fontSize:11, color:"#475569", marginBottom:16, fontStyle:"italic" } },
        "Prices fetched live from TCGPlayer via TCGCSV. Cards marked ",
        h("span", { style:{ color:"#F59E0B" } }, "⚠ manual"),
        " use last-sale data where market price is unavailable. Always verify before purchasing."
      ),

      // ── Set Grid ──
      h("div", { style:{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:12 } },
        filtered.map(set => {
          const tc = TIER_CONFIG[set.tier] || TIER_CONFIG.hold;
          const isOpen = expanded === set.id;
          const hasCards = set.top5.length > 0 && set.top5[0].price > 0;

          return h("div", { key:set.id, style:{ background:"linear-gradient(135deg,#111827 0%,#0f172a 100%)", border:"1px solid " + (isOpen ? tc.color : tc.border), borderRadius:11, overflow:"hidden", transition:"box-shadow 0.15s" } },

            // Card header (clickable)
            h("div", { style:{ padding:"14px 16px", cursor:"pointer", position:"relative" }, onClick:()=>setExpanded(isOpen ? null : set.id) },
              h("div", { style:{ position:"absolute", top:0, left:0, right:0, height:3, background:tc.color, opacity:0.7 } }),
              h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginTop:4, marginBottom:6 } },
                h("div", null,
                  h("span", { style:{ fontSize:10, color:"#64748B", letterSpacing:"0.12em", textTransform:"uppercase" } }, TYPE_LABELS[set.type]),
                  h("div", { style:{ fontSize:11, color:"#94A3B8", fontFamily:"monospace", marginTop:1 } }, set.code)
                ),
                h("span", { style:{ fontSize:10, padding:"3px 8px", borderRadius:20, background:tc.bg, color:tc.color, border:"1px solid "+tc.border, whiteSpace:"nowrap" } }, tc.label)
              ),
              h("div", { style:{ fontSize:16, fontWeight:700, color:"#F1F5F9", marginBottom:2 } }, set.name),
              h("div", { style:{ fontSize:11, color:"#64748B", marginBottom:10 } }, "Released: " + set.release + " · " + set.packs + " packs/box"),

              // Price + metric row
              h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 } },
                h("div", null,
                  h("div", { style:{ fontSize:24, fontWeight:800, color: loadState==="done" ? tc.color : "#475569", lineHeight:1 } },
                    loadState === "loading" ? "…" : (set.price ? fmt(set.price) : "N/A")
                  ),
                  h("div", { style:{ fontSize:10, color:"#64748B", marginTop:2 } }, "sealed box (market)")
                ),
                set.ratio && h("div", { style:{ textAlign:"right" } },
                  h("div", { style:{ fontSize:20, fontWeight:800, color:set.metricColor, lineHeight:1 } }, set.ratio + "x"),
                  h("div", { style:{ fontSize:10, color:"#64748B", marginTop:2 } }, "value metric")
                )
              ),

              // Notes + #1 card
              h("div", { style:{ borderTop:"1px solid rgba(255,255,255,0.07)", paddingTop:8 } },
                hasCards && h("div", { style:{ fontSize:11, marginBottom:4 } },
                  h("span", { style:{ color:"#FFD700" } }, "#1 card: "),
                  h("span", { style:{ color:"#60A5FA" } }, set.top5[0].name),
                  h("span", { style:{ color:"#34D399", marginLeft:6, fontWeight:700 } }, fmt(set.top5[0].price)),
                  set.top5[0].manual && h("span", { style:{ color:"#F59E0B", marginLeft:6, fontSize:10 } }, "⚠ manual")
                ),
                h("div", { style:{ fontSize:11, color:"#64748B", lineHeight:1.5, marginBottom:6 } }, set.notes),
                h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center" } },
                  React.createElement(TrendIcon, { trend: set.tier === "new" ? "new" : set.tier === "trophy" ? "up" : "stable" }),
                  h("span", { style:{ fontSize:11, color:"#475569" } }, isOpen ? "▲ Hide" : "▼ Top 5 cards")
                )
              )
            ),

            // Expandable top 5
            isOpen && h("div", { style:{ background:"rgba(0,0,0,0.35)", borderTop:"1px solid rgba(255,255,255,0.07)", padding:"12px 16px" } },
              h("div", { style:{ fontSize:10, color:"#94A3B8", marginBottom:8, letterSpacing:"0.1em", textTransform:"uppercase" } }, "Top 5 Cards — Ungraded EN Market Price"),
              hasCards
                ? set.top5.map((card, i) =>
                    h("div", { key:i, style:{ padding:"5px 0", borderBottom: i<set.top5.length-1 ? "1px solid rgba(255,255,255,0.05)" : "none" } },
                      h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 } },
                        h("div", { style:{ flex:1, minWidth:0 } },
                          h("span", { style:{ fontSize:10, color:"#475569", marginRight:4 } }, "#"+(i+1)),
                          h("span", { style:{ fontSize:11, color:"#CBD5E1" } }, card.name),
                          h("span", { style:{ fontSize:10, color:"#475569", marginLeft:4, fontFamily:"monospace" } }, "["+card.id+"]"),
                          card.manual && h("span", { style:{ fontSize:10, color:"#F59E0B", marginLeft:5 } }, "⚠ manual")
                        ),
                        h("span", { style:{ fontSize:12, fontWeight:700, color: i===0 ? "#FFD700" : "#94A3B8", whiteSpace:"nowrap" } }, fmt(card.price))
                      ),
                      card.manual && card.manualNote && h("div", { style:{ fontSize:10, color:"#78716C", marginTop:2, marginLeft:14, fontStyle:"italic" } }, card.manualNote)
                    )
                  )
                : h("div", { style:{ fontSize:11, color:"#475569", fontStyle:"italic" } }, "No card price data available yet."),

              // Summary
              hasCards && h("div", { style:{ marginTop:10, paddingTop:8, borderTop:"1px solid rgba(255,255,255,0.1)" } },
                h("div", { style:{ display:"flex", justifyContent:"space-between", marginBottom:3 } },
                  h("span", { style:{ fontSize:11, color:"#94A3B8" } }, "Top 5 Sum"),
                  h("span", { style:{ fontSize:13, fontWeight:700, color:"#60A5FA" } }, fmt(set.sum))
                ),
                h("div", { style:{ display:"flex", justifyContent:"space-between", marginBottom:3 } },
                  h("span", { style:{ fontSize:11, color:"#94A3B8" } }, "Box Price"),
                  h("span", { style:{ fontSize:13, fontWeight:700, color:"#94A3B8" } }, fmt(set.price))
                ),
                set.ratio && h("div", { style:{ display:"flex", justifyContent:"space-between" } },
                  h("span", { style:{ fontSize:11, color:"#94A3B8" } }, "Value Metric"),
                  h("span", { style:{ fontSize:16, fontWeight:800, color:set.metricColor } }, set.ratio + "x")
                )
              ),
              h("div", { style:{ fontSize:10, color:"#475569", marginTop:8, fontStyle:"italic" } }, "⚠ Ultra-rare pulls. Actual EV per box is much lower. Always verify before purchasing.")
            )
          );
        })
      ),

      // ── Investment Notes ──
      h("div", { style:{ marginTop:36, background:"rgba(255,215,0,0.05)", border:"1px solid rgba(255,215,0,0.2)", borderRadius:11, padding:"18px 20px" } },
        h("h3", { style:{ color:"#FFD700", marginTop:0, marginBottom:10, fontSize:14, letterSpacing:"0.05em" } }, "📊 Investment Notes"),
        h("div", { style:{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))", gap:12, fontSize:11, color:"#94A3B8", lineHeight:1.7 } },
          h("div", null, h("strong", { style:{ color:"#CBD5E1" } }, "Block 1 Rotation"), h("br"), "OP01–OP04 rotated out of Standard Apr 2026. Box prices are collector-driven — rotation reinforces their vintage status."),
          h("div", null, h("strong", { style:{ color:"#CBD5E1" } }, "Reprint Policy"), h("br"), "Bandai does limited reprints. Historical dips are ~20–25% before recovering. LCS generally don't receive additional waves."),
          h("div", null, h("strong", { style:{ color:"#CBD5E1" } }, "Best Entry Points"), h("br"), "OP08, OP10, OP12, and OP14 offer the lowest-risk entries with room to grow as supply tightens."),
          h("div", null, h("strong", { style:{ color:"#CBD5E1" } }, "Value Metric Note"), h("br"), "The metric uses ultra-rare pull values. True expected value per box is much lower. Use as a ceiling indicator only."),
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
